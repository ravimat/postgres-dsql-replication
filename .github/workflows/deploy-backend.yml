name: Deploy Backend (Docker → ECR → ECS)

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'requirements.txt'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force new ECS deployment even without image changes'
        type: boolean
        default: false

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: cdc-pg-dsql
  ECS_CLUSTER: cdc-cluster
  ECS_SERVICE: cdc-pg-dsql-service
  CONTAINER_NAME: cdc-worker

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    name: Build Docker Image & Deploy to ECS
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            --build-arg BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            --build-arg GIT_SHA=${{ github.sha }} \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            .

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition $ECS_SERVICE \
            --query 'taskDefinition' \
            --output json > task-definition.json

          # Remove fields that can't be used in RegisterTaskDefinition
          jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' \
            task-definition.json > clean-task-def.json

      - name: Update task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: clean-task-def.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
          wait-for-minutes: 10

      - name: Verify deployment health
        run: |
          echo "Waiting 30s for metrics to populate..."
          sleep 30

          # Check CloudWatch for recent errors
          ERRORS=$(aws cloudwatch get-metric-data \
            --metric-data-queries '[{
              "Id": "errors",
              "MetricStat": {
                "Metric": {"Namespace": "CDC/PgToDSQL", "MetricName": "EventsFailed"},
                "Period": 300,
                "Stat": "Sum"
              }
            }]' \
            --start-time $(date -u -d '5 minutes ago' +%Y-%m-%dT%H:%M:%S) \
            --end-time $(date -u +%Y-%m-%dT%H:%M:%S) \
            --query 'MetricDataResults[0].Values[0]' \
            --output text 2>/dev/null || echo "0")

          if [ "$ERRORS" != "None" ] && [ "$ERRORS" != "0" ]; then
            echo "⚠️ Warning: $ERRORS failed events detected post-deploy"
          else
            echo "✅ No errors detected post-deploy"
          fi

      - name: Deployment summary
        run: |
          echo "## ✅ Backend Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`${{ steps.build.outputs.image }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **ECS Cluster:** \`${{ env.ECS_CLUSTER }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **ECS Service:** \`${{ env.ECS_SERVICE }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  deploy-api-lambda:
    name: Deploy API Lambda (SAM)
    runs-on: ubuntu-latest
    environment: production
    needs: []  # Runs in parallel with Docker build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: SAM Build
        run: |
          cd infra
          sam build --template template.yaml

      - name: SAM Deploy
        run: |
          cd infra
          sam deploy \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --stack-name cdc-dashboard \
            --capabilities CAPABILITY_IAM CAPABILITY_AUTO_EXPAND \
            --parameter-overrides \
              Environment=prod \
              EcsClusterName=${{ env.ECS_CLUSTER }} \
              EcsServiceName=${{ env.ECS_SERVICE }}
