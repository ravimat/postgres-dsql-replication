name: Deploy Frontend to S3/CloudFront

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

permissions:
  id-token: write
  contents: read

jobs:
  deploy-frontend:
    name: Deploy Static Frontend
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get CloudFormation outputs
        id: cfn
        run: |
          BUCKET=$(aws cloudformation describe-stacks \
            --stack-name cdc-dashboard \
            --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" \
            --output text)
          DISTRIBUTION_ID=$(aws cloudformation describe-stacks \
            --stack-name cdc-dashboard \
            --query "Stacks[0].Outputs[?OutputKey=='CloudFrontDistributionId'].OutputValue" \
            --output text)
          API_ENDPOINT=$(aws cloudformation describe-stacks \
            --stack-name cdc-dashboard \
            --query "Stacks[0].Outputs[?OutputKey=='ApiEndpoint'].OutputValue" \
            --output text)
          echo "bucket=$BUCKET" >> $GITHUB_OUTPUT
          echo "distribution_id=$DISTRIBUTION_ID" >> $GITHUB_OUTPUT
          echo "api_endpoint=$API_ENDPOINT" >> $GITHUB_OUTPUT

      - name: Inject API URL into frontend
        run: |
          # Write API config that the frontend reads
          cat > frontend/js/config.js << EOF
          // Auto-generated by CI/CD — do not edit
          window.CDC_API_URL = '${{ steps.cfn.outputs.api_endpoint }}';
          EOF
          # Add config.js script tag before app.js in index.html
          sed -i 's|<script src="js/app.js"></script>|<script src="js/config.js"></script>\n    <script src="js/app.js"></script>|' frontend/index.html

      - name: Sync to S3
        run: |
          aws s3 sync frontend/ s3://${{ steps.cfn.outputs.bucket }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "js/config.js"

          # index.html and config — short cache for quick updates
          aws s3 cp frontend/index.html s3://${{ steps.cfn.outputs.bucket }}/index.html \
            --cache-control "public, max-age=60"
          aws s3 cp frontend/js/config.js s3://${{ steps.cfn.outputs.bucket }}/js/config.js \
            --cache-control "public, max-age=60"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ steps.cfn.outputs.distribution_id }} \
            --paths "/index.html" "/js/config.js" "/js/app.js" "/css/style.css"

      - name: Summary
        run: |
          echo "## ✅ Frontend Deployed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **S3 Bucket:** \`${{ steps.cfn.outputs.bucket }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **CloudFront Distribution:** \`${{ steps.cfn.outputs.distribution_id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Dashboard URL:** https://$(aws cloudfront get-distribution --id ${{ steps.cfn.outputs.distribution_id }} --query 'Distribution.DomainName' --output text)" >> $GITHUB_STEP_SUMMARY
