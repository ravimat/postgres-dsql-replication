AWSTemplateFormatVersion: '2010-09-09'
Description: |
  PostgreSQL to Aurora DSQL CDC Replication - One-Click Deployment
  Deploys the full CDC solution from a GitHub repository:
  - EC2 CDC service with systemd (24/7 streaming replication)
  - CloudFront + S3 monitoring dashboard
  - API Gateway + Lambda metrics proxy
  - CloudWatch Dashboard with replication metrics

Parameters:
  # --- Source Code ---
  
  GitHubRepoOwner:
    Type: String
    Description: GitHub repository owner (user or org)
  
  GitHubRepoName:
    Type: String
    Description: GitHub repository name
  
  GitHubBranch:
    Type: String
    Default: main
    Description: Branch to deploy from

  
  
  
  ConflictMode:
    Type: String
    Default: upsert
    AllowedValues: [upsert, skip, fail, last_write_wins]
    Description: How to handle conflicts on the target

  SlotName:
    Type: String
    Default: dsql_cdc_slot
    Description: PostgreSQL logical replication slot name

  DecodingPlugin:
    Type: String
    Default: test_decoding
    AllowedValues: [test_decoding, pgoutput]
    Description: Logical decoding plugin

  BatchSize:
    Type: Number
    Default: 1000
    Description: Events per batch

  ParallelWorkers:
    Type: Number
    Default: 4
    Description: Parallel DSQL writer threads

  # --- Networking ---

  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: Amazon Linux 2023 AMI (auto-resolved via SSM)

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC with connectivity to source PG and DSQL

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnets for EC2 instance and VPC endpoints

  SecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security group allowing outbound to PG (5432) and DSQL


Resources:


  # ==========================================================================
  # SECRETS
  # ==========================================================================
  # ==========================================================================

  # ==========================================================================
  # EC2 INSTANCE (CDC Service)
  # ==========================================================================
  CDCInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: CDCInstancePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                  - dsql:DbConnectAdmin
                  - secretsmanager:GetSecretValue
                Resource: '*'
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub ${CDCArchiveBucket.Arn}/*
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:PutObject
                  - s3:DeleteObject
                Resource:
                  - !Sub ${FrontendBucket.Arn}
                  - !Sub ${FrontendBucket.Arn}/*
              - Effect: Allow
                Action:
                  - logs:*
                Resource: '*'
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchGetImage
                  - ecr:GetDownloadUrlForLayer
                Resource: '*'

  CDCInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref CDCInstanceRole]

  CDCInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.medium
      ImageId: !Ref LatestAmiId
      IamInstanceProfile: !Ref CDCInstanceProfile
      NetworkInterfaces:
        - DeviceIndex: '0'
          SubnetId: !Select [0, !Ref SubnetIds]
          GroupSet: [!Ref SecurityGroupId]
          AssociatePublicIpAddress: true
      MetadataOptions:
        HttpTokens: required
        HttpEndpoint: enabled
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-cdc-worker
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -ex

          # Install dependencies
          yum update -y
          yum install -y python3.11 python3.11-pip git

          # Create app directory
          mkdir -p /opt/cdc
          cd /opt/cdc

          # Clone the repository
          git clone https://github.com/${GitHubRepoOwner}/${GitHubRepoName}.git .
          git checkout ${GitHubBranch}

          # Install Python dependencies
          python3.11 -m pip install psycopg2-binary boto3

          # Database connections configured via frontend dashboard

          # Create environment file
          cat > /opt/cdc/.env << ENVEOF
          SOURCE_DSN=""
          TARGET_DSN=""
          DSQL_HOSTNAME=
          DSQL_REGION=${AWS::Region}
          SLOT_NAME=${SlotName}
          DECODING_PLUGIN=${DecodingPlugin}
          CONFLICT_MODE=${ConflictMode}
          BATCH_SIZE=${BatchSize}
          PARALLEL_WORKERS=${ParallelWorkers}
          FLUSH_INTERVAL_MS=500
          HEALTH_PORT=8080
          METRICS_ENABLED=true
          LOG_LEVEL=INFO
          S3_BUCKET=${CDCArchiveBucket}
          CONTROL_FILE=/opt/cdc/control.json
          ENVEOF

          # Strip leading whitespace from .env (YAML heredoc indentation artifact)
          sed -i 's/^[[:space:]]*//' /opt/cdc/.env

          # Create systemd service
          cat > /etc/systemd/system/cdc-service.service << SVCEOF
          [Unit]
          Description=PG to Aurora DSQL CDC Replication Service
          After=network.target

          [Service]
          Type=simple
          User=root
          WorkingDirectory=/opt/cdc
          EnvironmentFile=/opt/cdc/.env
          ExecStart=/usr/bin/python3.11 /opt/cdc/cdc_service.py
          Restart=on-failure
          RestartSec=5
          StandardOutput=append:/var/log/cdc/cdc-service.log
          StandardError=append:/var/log/cdc/cdc-service.log

          [Install]
          WantedBy=multi-user.target
          SVCEOF

          # Strip leading whitespace from service file (YAML heredoc indentation artifact)
          sed -i 's/^[[:space:]]*//' /etc/systemd/system/cdc-service.service

          # Start the service
          systemctl daemon-reload
          # Service starts in stopped state — user starts via dashboard after configuring DSN
          echo '{"state": "stopped"}' > /opt/cdc/control.json

          systemctl enable cdc-service



          # Configure CloudWatch Logs agent (file-based collection)
          yum install -y amazon-cloudwatch-agent || true
          mkdir -p /var/log/cdc
          cat > /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json << 'CWEOF'
          {"logs":{"logs_collected":{"files":{"collect_list":[{"file_path":"/var/log/cdc/cdc-service.log","log_group_name":"/ec2/${AWS::StackName}-cdc","log_stream_name":"{instance_id}","retention_in_days":30},{"file_path":"/tmp/loadtest_output.log","log_group_name":"/ec2/${AWS::StackName}-cdc","log_stream_name":"loadtest","retention_in_days":30}]}}}}
          CWEOF
          sed -i 's/^[[:space:]]*//' /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json
          /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl -a fetch-config -m ec2 -s -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json || true

          # Deploy frontend to S3 (so dashboard works immediately without pipeline)
          aws s3 sync /opt/cdc/frontend/ s3://${FrontendBucket}/ --delete --region ${AWS::Region}

          # Signal CloudFormation
          /opt/aws/bin/cfn-signal -e $? --stack ${AWS::StackName} --resource CDCInstance --region ${AWS::Region}
    CreationPolicy:
      ResourceSignal:
        Timeout: PT10M

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ec2/${AWS::StackName}-cdc
      RetentionInDays: 30

    # ==========================================================================
  # S3 BUCKETS
  # ==========================================================================
  CDCArchiveBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${AWS::StackName}-archive-${AWS::AccountId}
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToIA
            Status: Enabled
            Transitions:
              - StorageClass: STANDARD_IA
                TransitionInDays: 30
          - Id: Expire
            Status: Enabled
            ExpirationInDays: 90

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${AWS::StackName}-dashboard-${AWS::AccountId}
      WebsiteConfiguration:
        IndexDocument: index.html

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Sid: CloudFrontAccess
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${FrontendBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}

  # ==========================================================================
  # CLOUDFRONT
  # ==========================================================================
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub ${AWS::StackName}-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ''
          - Id: APIOrigin
            DomainName: !Sub ${MetricsAPI}.execute-api.${AWS::Region}.amazonaws.com
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: APIOrigin
            ViewerProtocolPolicy: https-only
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, PATCH, POST, DELETE]
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac  # AllViewerExceptHostHeader
        PriceClass: PriceClass_100

  # ==========================================================================
  # API GATEWAY + LAMBDA (Metrics Proxy)
  # ==========================================================================
  MetricsLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      Policies:
        - PolicyName: CloudWatchRead
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudwatch:GetMetricData
                  - cloudwatch:ListMetrics
                  - ec2:DescribeInstanceStatus
                  - ec2:DescribeInstances
                  - ssm:SendCommand
                  - ssm:GetCommandInvocation
                  - s3:GetObject
                  - dsql:DbConnectAdmin
                  - logs:*
                Resource: '*'

  MetricsLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-metrics-api
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt MetricsLambdaRole.Arn
      Timeout: 30
      MemorySize: 256
      VpcConfig:
        SubnetIds: !Ref SubnetIds
        SecurityGroupIds: [!Ref SecurityGroupId]
      Environment:
        Variables:
          CW_NAMESPACE: CDC/PgToDSQL
          CDC_INSTANCE_ID: !Ref CDCInstance
          CDC_HEALTH_PORT: '8080'
          LOG_GROUP_NAME: !Sub /ec2/${AWS::StackName}-cdc
          CDC_PRIVATE_IP: !GetAtt CDCInstance.PrivateIp
          S3_BUCKET: !Ref CDCArchiveBucket
      Code:
        ZipFile: |
          import json
          import os
          import boto3
          from datetime import datetime, timedelta, timezone

          cw = boto3.client('cloudwatch')
          ec2_client = boto3.client('ec2')
          NAMESPACE = os.environ.get('CW_NAMESPACE', 'CDC/PgToDSQL')

          def handler(event, context):
              path = event.get('rawPath', event.get('path', '/'))
              method = event.get('requestContext', {}).get('http', {}).get('method', event.get('httpMethod', 'GET'))
              body = {}
              if event.get('body'):
                  try: body = json.loads(event['body'])
                  except: body = {}

              if '/health' in path:
                  return get_health()
              elif '/metrics' in path:
                  return get_metrics()
              elif '/table-mapping' in path and method == 'POST':
                  return post_table_mapping(body)
              elif '/table-mapping' in path and method == 'GET':
                  return get_table_mapping()
              elif '/control' in path and method == 'POST':
                  return post_control(body)
              elif '/loadtest/status' in path and method == 'GET':
                  qp = event.get('queryStringParameters', {}) or {}
                  return get_loadtest_status(qp)
              elif '/loadtest/tables' in path and method == 'GET':
                  # Proxy to EC2 health server
                  return get_health_path('/loadtest/tables')
              elif '/loadtest' in path and method == 'POST':
                  return post_loadtest(body)
              elif '/config' in path and method == 'POST':
                  return post_config(body)
              elif '/test-connection' in path and method == 'POST':
                  return post_test_connection(body)
              elif '/dsn' in path and method == 'POST':
                  return post_dsn(body)
              else:
                  return response(200, {'status': 'ok', 'endpoints': ['/api/health', '/api/metrics', '/api/table-mapping', '/api/control', '/api/loadtest', '/api/test-connection', '/api/dsn']})

          def get_metrics():
              end = datetime.now(timezone.utc)
              start = end - timedelta(hours=1)
              
              result = cw.get_metric_data(
                  MetricDataQueries=[
                      metric_query('lag', 'ReplicationLagBytes', 'Average'),
                      metric_query('events', 'EventsAppliedPerMinute', 'Sum'),
                      metric_query('failed', 'EventsFailed', 'Sum'),
                      metric_query('queue', 'BatchQueueDepth', 'Average'),
                  ],
                  StartTime=start,
                  EndTime=end,
              )
              
              metrics = {}
              for r in result['MetricDataResults']:
                  metrics[r['Id']] = {
                      'timestamps': [t.isoformat() for t in r['Timestamps']],
                      'values': r['Values'],
                  }
              
              return response(200, metrics)

          def get_health():
              import urllib.request
              try:
                  instance_id = os.environ['CDC_INSTANCE_ID']
                  private_ip = os.environ.get('CDC_PRIVATE_IP', '')
                  port = os.environ.get('CDC_HEALTH_PORT', '8080')
                  url = f'http://{private_ip}:{port}/health'
                  req = urllib.request.urlopen(url, timeout=5)
                  health_data = json.loads(req.read().decode())
                  health_data['instance_id'] = instance_id
                  return response(200, health_data)
              except Exception as e:
                  return response(200, {'healthy': False, 'error': str(e), 'instance_id': os.environ.get('CDC_INSTANCE_ID', '')})

          def get_health_path(path):
              import urllib.request
              try:
                  private_ip = os.environ.get('CDC_PRIVATE_IP', '')
                  port = os.environ.get('CDC_HEALTH_PORT', '8080')
                  url = f'http://{private_ip}:{port}{path}'
                  req = urllib.request.urlopen(url, timeout=5)
                  return response(200, json.loads(req.read().decode()))
              except Exception as e:
                  return response(200, {'tables': [], 'error': str(e)})

          def metric_query(id, name, stat):
              return {
                  'Id': id,
                  'MetricStat': {
                      'Metric': {'Namespace': NAMESPACE, 'MetricName': name},
                      'Period': 60,
                      'Stat': stat,
                  },
              }

          def post_table_mapping(body):
              import base64
              ssm = boto3.client('ssm')
              instance_id = os.environ['CDC_INSTANCE_ID']
              rules = body.get('rules', [])
              count = sum(1 for r in rules if r.get('rule-type') == 'selection')
              b64 = base64.b64encode(json.dumps(body, indent=2).encode()).decode()
              ssm.send_command(InstanceIds=[instance_id], DocumentName='AWS-RunShellScript', Parameters={'commands': [cmd]})
              return response(200, {'status': 'applied', 'rules_count': count})

          def get_table_mapping():
              import time as t
              ssm = boto3.client('ssm')
              instance_id = os.environ['CDC_INSTANCE_ID']
              r = ssm.send_command(InstanceIds=[instance_id], DocumentName='AWS-RunShellScript',
                  Parameters={'commands': ["cat /opt/cdc/table_rules.json 2>/dev/null || echo '{}'"]})
              t.sleep(2)
              inv = ssm.get_command_invocation(CommandId=r['Command']['CommandId'], InstanceId=instance_id)
              if inv['Status'] == 'Success':
                  try: return response(200, json.loads(inv['StandardOutputContent']))
                  except: return response(200, {'content': inv['StandardOutputContent']})
              return response(200, {'rules': []})

          def post_control(body):
              ssm = boto3.client('ssm')
              instance_id = os.environ['CDC_INSTANCE_ID']
              action = body.get('action', body.get('state', ''))
              state_map = {'start': 'running', 'resume': 'running', 'pause': 'paused', 'stop': 'stopped'}
              state = state_map.get(action, action)
              if state not in ('running', 'paused', 'stopped'):
                  return response(400, {'error': f'Invalid: {action}'})
              cmd = 'echo \'{"state": "' + state + '"}\' > /opt/cdc/control.json'
              if state == 'running': cmd += ' && systemctl start cdc-service 2>/dev/null || true'
              ssm.send_command(InstanceIds=[instance_id], DocumentName='AWS-RunShellScript', Parameters={'commands': [cmd]})
              return response(200, {'status': 'ok', 'state': state})

          def post_loadtest(body):
              import time as t
              ssm = boto3.client('ssm')
              instance_id = os.environ['CDC_INSTANCE_ID']
              duration = int(body.get('duration', 300))
              ops = int(body.get('orders_per_sec', 20))
              threads = int(body.get('threads', 4))
              cmd = (
                  f'set -a && source /opt/cdc/.env && set +a && '
                  f'cd /opt/cdc && '
                  f'DSQL_TOKEN=$(python3.11 -c "import boto3;print(boto3.client(\'dsql\',region_name=\'$DSQL_REGION\').generate_db_connect_admin_auth_token(Hostname=\'$DSQL_HOSTNAME\',Region=\'$DSQL_REGION\',ExpiresIn=900))") && '
                  f'python3.11 -u /opt/cdc/load_test_orders.py '
                  f'--source-dsn "$SOURCE_DSN" '
                  f'--target-dsn "host=$DSQL_HOSTNAME port=5432 dbname=postgres user=admin password=$DSQL_TOKEN sslmode=require" '
                  f'--duration {duration} '
                  f'--orders-per-sec {ops} '
                  f'--threads {threads} '
                  f'2>&1 | tee /tmp/loadtest_output.log'
              )
              r = ssm.send_command(
                  InstanceIds=[instance_id],
                  DocumentName='AWS-RunShellScript',
                  Parameters={'commands': [cmd]},
                  TimeoutSeconds=min(duration + 120, 3600),
              )
              return response(200, {'status': 'started', 'command_id': r['Command']['CommandId']})

          def get_loadtest_status(qp):
              import time as t
              ssm = boto3.client('ssm')
              instance_id = os.environ['CDC_INSTANCE_ID']
              command_id = qp.get('command_id', '')
              if not command_id:
                  return response(400, {'error': 'command_id required'})
              try:
                  inv = ssm.get_command_invocation(CommandId=command_id, InstanceId=instance_id)
                  status = inv['Status']
                  output = inv.get('StandardOutputContent', '')[-2000:]
                  if status in ('Success',):
                      return response(200, {'status': 'complete', 'output': output})
                  elif status in ('Failed', 'TimedOut', 'Cancelled'):
                      return response(200, {'status': 'failed', 'error': inv.get('StandardErrorContent', '')[-1000:], 'output': output})
                  else:
                      return response(200, {'status': 'running', 'output': output})
              except Exception as e:
                  return response(200, {'status': 'running', 'output': ''})

          def post_test_connection(body):
              import time as t
              ssm = boto3.client('ssm')
              logs = boto3.client('logs')
              instance_id = os.environ['CDC_INSTANCE_ID']
              source_dsn = body.get('source_dsn', '')
              target_dsn = body.get('target_dsn', '')
              results = {}
              # Test source
              if source_dsn:
                  cmd = f'python3.11 -c "import psycopg2; c=psycopg2.connect(\'{source_dsn}\'); cur=c.cursor(); cur.execute(\'SELECT version()\'); print(cur.fetchone()[0][:50]); c.close()"'
                  try:
                      r = ssm.send_command(InstanceIds=[instance_id], DocumentName='AWS-RunShellScript', Parameters={'commands': [cmd]}, TimeoutSeconds=30)
                      t.sleep(5)
                      inv = ssm.get_command_invocation(CommandId=r['Command']['CommandId'], InstanceId=instance_id)
                      if inv['Status'] == 'Success':
                          results['source_ok'] = True
                          results['source_version'] = inv.get('StandardOutputContent', '').strip()
                      else:
                          results['source_ok'] = False
                          results['source_error'] = inv.get('StandardErrorContent', '')[:200]
                  except Exception as e:
                      results['source_ok'] = False
                      results['source_error'] = str(e)[:200]
              # Test target (base64-encode script, run on EC2 which has boto3 + IAM role)
              if target_dsn:
                  try:
                      region = os.environ.get('AWS_REGION', 'us-east-1')
                      script = "import psycopg2,boto3\n"
                      script += "c=boto3.client('dsql',region_name='" + region + "')\n"
                      script += "token=c.generate_db_connect_admin_auth_token(Hostname='" + target_dsn + "',Region='" + region + "',ExpiresIn=3600)\n"
                      script += "conn=psycopg2.connect(\n"
                      script += "    host='" + target_dsn + "',\n"
                      script += "    port=5432,\n"
                      script += "    dbname='postgres',\n"
                      script += "    user='admin',\n"
                      script += "    password=token,\n"
                      script += "    sslmode='require')\n"
                      script += "conn.cursor().execute('SELECT 1')\n"
                      script += "print('DSQL connected')\n"
                      script += "conn.close()\n"
                      import base64
                      b64_script = base64.b64encode(script.encode()).decode()
                      cmd = f'echo {b64_script} | base64 -d > /tmp/test_dsql.py && python3.11 /tmp/test_dsql.py && rm -f /tmp/test_dsql.py'
                      r = ssm.send_command(InstanceIds=[instance_id], DocumentName='AWS-RunShellScript', Parameters={'commands': [cmd]}, TimeoutSeconds=30)
                      t.sleep(5)
                      inv = ssm.get_command_invocation(CommandId=r['Command']['CommandId'], InstanceId=instance_id)
                      if inv['Status'] == 'Success':
                          results['target_ok'] = True
                          results['target_status'] = inv.get('StandardOutputContent', '').strip()
                      else:
                          results['target_ok'] = False
                          results['target_error'] = inv.get('StandardErrorContent', '')[:200]
                  except Exception as e:
                      results['target_ok'] = False
                      results['target_error'] = str(e)[:200]
              # Log test results to CloudWatch
              try:
                  import time as t2
                  log_group = os.environ.get('LOG_GROUP_NAME', '/ec2/cdc-service')
                  log_stream = 'connection-tests'
                  try: logs.create_log_stream(logGroupName=log_group, logStreamName=log_stream)
                  except: pass
                  logs.put_log_events(logGroupName=log_group, logStreamName=log_stream, logEvents=[{'timestamp': int(t2.time()*1000), 'message': json.dumps(results)}])
              except: pass
              return response(200, results)

          def post_dsn(body):
              import base64
              ssm = boto3.client('ssm')
              instance_id = os.environ['CDC_INSTANCE_ID']
              source_dsn = body.get('source_dsn', '')
              target_dsn = body.get('target_dsn', '')
              # Update .env file on EC2 and restart service
              cmds = []
              if source_dsn:
                  cmds.append("sed -i 's|^SOURCE_DSN=.*|SOURCE_DSN=\"" + source_dsn + "\"|' /opt/cdc/.env")
              if target_dsn:
                  cmds.append("sed -i 's|^TARGET_DSN=.*|TARGET_DSN=\"host=" + target_dsn + " port=5432 dbname=postgres user=admin sslmode=require\"|' /opt/cdc/.env")
                  cmds.append(f"sed -i 's|^DSQL_HOSTNAME=.*|DSQL_HOSTNAME={target_dsn}|' /opt/cdc/.env")
              cmds.append('systemctl restart cdc-service')
              cmd = ' && '.join(cmds)
              ssm.send_command(InstanceIds=[instance_id], DocumentName='AWS-RunShellScript', Parameters={'commands': [cmd]})
              return response(200, {'status': 'ok', 'message': 'DSN updated, service restarting'})

          def post_config(body):
              ssm = boto3.client('ssm')
              instance_id = os.environ['CDC_INSTANCE_ID']
              cmds = []
              batch_size = body.get('batch_size')
              conflict_mode = body.get('conflict_mode')
              slot_name = body.get('slot_name')
              if batch_size:
                  cmds.append("sed -i 's|^BATCH_SIZE=.*|BATCH_SIZE=" + str(int(batch_size)) + "|' /opt/cdc/.env")
              if conflict_mode:
                  cmds.append("sed -i 's|^CONFLICT_MODE=.*|CONFLICT_MODE=" + conflict_mode + "|' /opt/cdc/.env")
              if slot_name:
                  cmds.append("sed -i 's|^SLOT_NAME=.*|SLOT_NAME=" + slot_name + "|' /opt/cdc/.env")
              if cmds:
                  cmds.append('systemctl restart cdc-service')
                  cmd = ' && '.join(cmds)
                  ssm.send_command(InstanceIds=[instance_id], DocumentName='AWS-RunShellScript', Parameters={'commands': [cmd]})
              return response(200, {'status': 'ok', 'message': 'Configuration saved, service restarting'})

          def response(code, body):
              return {
                  'statusCode': code,
                  'headers': {
                      'Content-Type': 'application/json',
                      'Access-Control-Allow-Origin': '*',
                  },
                  'body': json.dumps(body, default=str),
              }

  MetricsAPI:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub ${AWS::StackName}-api
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type

  MetricsAPIIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref MetricsAPI
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt MetricsLambda.Arn
      PayloadFormatVersion: '2.0'

  MetricsAPIRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref MetricsAPI
      RouteKey: GET /api/{proxy+}
      Target: !Sub integrations/${MetricsAPIIntegration}

  MetricsAPIRoutePost:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref MetricsAPI
      RouteKey: POST /api/{proxy+}
      Target: !Sub integrations/${MetricsAPIIntegration}

  MetricsAPIStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref MetricsAPI
      StageName: $default
      AutoDeploy: true

  MetricsLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref MetricsLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${MetricsAPI}/*

  # ==========================================================================
  # CODEPIPELINE CI/CD
  # ==========================================================================

  # Custom Resource to empty S3 buckets on stack deletion
  EmptyBucketsOnDelete:
    Type: Custom::EmptyBuckets
    Properties:
      ServiceToken: !GetAtt EmptyBucketsFunction.Arn
      Buckets:
        - !Ref CDCArchiveBucket
        - !Ref FrontendBucket

  EmptyBucketsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-empty-buckets
      Runtime: python3.12
      Handler: index.handler
      Timeout: 120
      Role: !GetAtt EmptyBucketsRole.Arn
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          def handler(event, context):
              if event['RequestType'] == 'Delete':
                  s3 = boto3.resource('s3')
                  for bucket_name in event['ResourceProperties'].get('Buckets', []):
                      try:
                          bucket = s3.Bucket(bucket_name)
                          bucket.object_versions.delete()
                          bucket.objects.delete()
                          print(f'Emptied bucket: {bucket_name}')
                      except Exception as e:
                          print(f'Error emptying {bucket_name}: {e}')
              cfnresponse.send(event, context, cfnresponse.SUCCESS, {})

  EmptyBucketsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: EmptyBuckets
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:DeleteObject
                  - s3:DeleteObjectVersion
                  - s3:ListBucket
                  - s3:ListBucketVersions
                  - s3:GetObject
                Resource:
                  - !Sub ${CDCArchiveBucket.Arn}
                  - !Sub ${CDCArchiveBucket.Arn}/*
                  - !Sub ${FrontendBucket.Arn}
                  - !Sub ${FrontendBucket.Arn}/*


  # CLOUDWATCH DASHBOARD
  # ==========================================================================
  CDCDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub ${AWS::StackName}-CDC-Monitor
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric", "x": 0, "y": 0, "width": 12, "height": 6,
              "properties": {
                "title": "Replication Lag (Bytes)",
                "metrics": [["CDC/PgToDSQL", "ReplicationLagBytes"]],
                "period": 60, "stat": "Average", "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric", "x": 12, "y": 0, "width": 12, "height": 6,
              "properties": {
                "title": "Events Applied / Minute",
                "metrics": [["CDC/PgToDSQL", "EventsAppliedPerMinute"]],
                "period": 60, "stat": "Sum", "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric", "x": 0, "y": 6, "width": 12, "height": 6,
              "properties": {
                "title": "Events Failed",
                "metrics": [["CDC/PgToDSQL", "EventsFailed"]],
                "period": 60, "stat": "Sum", "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric", "x": 12, "y": 6, "width": 12, "height": 6,
              "properties": {
                "title": "Batch Queue Depth",
                "metrics": [["CDC/PgToDSQL", "BatchQueueDepth"]],
                "period": 60, "stat": "Average", "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric", "x": 0, "y": 12, "width": 24, "height": 6,
              "properties": {
                "title": "EC2 Instance CPU",
                "metrics": [
                  ["AWS/EC2", "CPUUtilization", "InstanceId", "${CDCInstance}"]
                ],
                "period": 60, "stat": "Average", "region": "${AWS::Region}"
              }
            }
          ]
        }

  # ==========================================================================
  # ALARMS
  # ==========================================================================
  LagAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-HighReplicationLag
      MetricName: ReplicationLagBytes
      Namespace: CDC/PgToDSQL
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      Threshold: 104857600  # 100MB
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: breaching

  FailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-EventFailures
      MetricName: EventsFailed
      Namespace: CDC/PgToDSQL
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

Outputs:
