AWSTemplateFormatVersion: '2010-09-09'
Description: |
  PostgreSQL to Aurora DSQL CDC Replication - One-Click Deployment
  Deploys the full CDC solution from a GitHub repository:
  - EC2 CDC service with systemd (24/7 streaming replication)
  - CloudFront + S3 monitoring dashboard
  - API Gateway + Lambda metrics proxy
  - CloudWatch Dashboard with replication metrics

Parameters:
  # --- Source Code ---
  
  GitHubRepoOwner:
    Type: String
    Description: GitHub repository owner (user or org)
  
  GitHubRepoName:
    Type: String
    Description: GitHub repository name
  
  GitHubBranch:
    Type: String
    Default: main
    Description: Branch to deploy from

  
  
  
  ConflictMode:
    Type: String
    Default: upsert
    AllowedValues: [upsert, skip, fail, last_write_wins]
    Description: How to handle conflicts on the target

  SlotName:
    Type: String
    Default: dsql_cdc_slot
    Description: PostgreSQL logical replication slot name

  DecodingPlugin:
    Type: String
    Default: test_decoding
    AllowedValues: [test_decoding, pgoutput]
    Description: Logical decoding plugin

  BatchSize:
    Type: Number
    Default: 1000
    Description: Events per batch

  ParallelWorkers:
    Type: Number
    Default: 4
    Description: Parallel DSQL writer threads

  # --- Networking ---

  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: Amazon Linux 2023 AMI (auto-resolved via SSM)

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC with connectivity to source PG and DSQL

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnets for EC2 instance and VPC endpoints

  SecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security group allowing outbound to PG (5432) and DSQL


Resources:


  # ==========================================================================
  # SECRETS
  # ==========================================================================
  # ==========================================================================

  # ==========================================================================
  # EC2 INSTANCE (CDC Service)
  # ==========================================================================
  CDCInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: CDCInstancePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                  - dsql:DbConnectAdmin
                Resource: '*'
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub 'arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:*'
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub ${CDCArchiveBucket.Arn}/*
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:PutObject
                  - s3:DeleteObject
                Resource:
                  - !Sub ${FrontendBucket.Arn}
                  - !Sub ${FrontendBucket.Arn}/*
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogStreams
                  - logs:DescribeLogGroups
                  - logs:PutRetentionPolicy
                Resource:
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/ec2/${AWS::StackName}*'
                  - !Sub 'arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group::log-stream:'


  CDCInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref CDCInstanceRole]

  CDCInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.medium
      ImageId: !Ref LatestAmiId
      IamInstanceProfile: !Ref CDCInstanceProfile
      NetworkInterfaces:
        - DeviceIndex: '0'
          SubnetId: !Select [0, !Ref SubnetIds]
          GroupSet: [!Ref SecurityGroupId]
          AssociatePublicIpAddress: true
      MetadataOptions:
        HttpTokens: required
        HttpEndpoint: enabled
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-cdc-worker
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -ex

          # Install dependencies
          yum update -y
          yum install -y python3.11 python3.11-pip git

          # Create app directory
          mkdir -p /opt/cdc
          cd /opt/cdc

          # Clone the repository
          # Retry git clone (network may not be ready on first boot)
          for i in 1 2 3 4 5; do
            git clone https://github.com/${GitHubRepoOwner}/${GitHubRepoName}.git . && break
            echo "Git clone attempt $i failed, retrying in 10s..."
            sleep 10
          done
          git checkout ${GitHubBranch}

          # Install Python dependencies
          python3.11 -m pip install psycopg2-binary boto3

          # Database connections configured via frontend dashboard

          # Create environment file
          # Create .env with restricted permissions (owner-only read/write)
          touch /opt/cdc/.env && chmod 600 /opt/cdc/.env
          cat > /opt/cdc/.env << ENVEOF
          SOURCE_DSN=""
          TARGET_DSN=""
          DSQL_HOSTNAME=
          DSQL_REGION=${AWS::Region}
          SLOT_NAME=${SlotName}
          DECODING_PLUGIN=${DecodingPlugin}
          CONFLICT_MODE=${ConflictMode}
          BATCH_SIZE=${BatchSize}
          PARALLEL_WORKERS=${ParallelWorkers}
          FLUSH_INTERVAL_MS=500
          HEALTH_PORT=8080
          METRICS_ENABLED=true
          LOG_LEVEL=INFO
          S3_BUCKET=${CDCArchiveBucket}
          CONTROL_FILE=/opt/cdc/control.json
          REPLICATION_MODE=batch
          ENVEOF

          # Strip leading whitespace from .env (YAML heredoc indentation artifact)
          sed -i 's/^[[:space:]]*//' /opt/cdc/.env

          # Create systemd service
          cat > /etc/systemd/system/cdc-service.service << SVCEOF
          [Unit]
          Description=PG to Aurora DSQL CDC Replication Service
          After=network.target

          [Service]
          Type=simple
          User=root
          WorkingDirectory=/opt/cdc
          EnvironmentFile=/opt/cdc/.env
          ExecStart=/usr/bin/python3.11 /opt/cdc/cdc_service.py
          Restart=on-failure
          RestartSec=5
          StandardOutput=append:/var/log/cdc/cdc-service.log
          StandardError=append:/var/log/cdc/cdc-service.log

          [Install]
          WantedBy=multi-user.target
          SVCEOF

          # Strip leading whitespace from service file (YAML heredoc indentation artifact)
          sed -i 's/^[[:space:]]*//' /etc/systemd/system/cdc-service.service

          # Start the service
          systemctl daemon-reload
          # Service starts in stopped state — user starts via dashboard after configuring DSN
          echo '{"state": "stopped"}' > /opt/cdc/control.json

          # Create log directory BEFORE starting service
          mkdir -p /var/log/cdc

          systemctl enable cdc-service
          systemctl start cdc-service
          # Service starts with control_state=stopped (health server up, no replication until user starts)


          # Configure CloudWatch Logs agent (file-based collection)
          yum install -y amazon-cloudwatch-agent || true
          cat > /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json << 'CWEOF'
          {"logs":{"logs_collected":{"files":{"collect_list":[{"file_path":"/var/log/cdc/cdc-service.log","log_group_name":"/ec2/${AWS::StackName}-cdc","log_stream_name":"{instance_id}","retention_in_days":30},{"file_path":"/tmp/loadtest_output.log","log_group_name":"/ec2/${AWS::StackName}-cdc","log_stream_name":"loadtest","retention_in_days":30}]}}}}
          CWEOF
          sed -i 's/^[[:space:]]*//' /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json
          /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl -a fetch-config -m ec2 -s -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json || true

          # Deploy frontend to S3 (so dashboard works immediately without pipeline)
          aws s3 sync /opt/cdc/frontend/ s3://${FrontendBucket}/ --delete --region ${AWS::Region}

          # Signal CloudFormation
          /opt/aws/bin/cfn-signal -e $? --stack ${AWS::StackName} --resource CDCInstance --region ${AWS::Region}
    CreationPolicy:
      ResourceSignal:
        Timeout: PT10M

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ec2/${AWS::StackName}-cdc
      RetentionInDays: 30

    # ==========================================================================
  # S3 BUCKETS
  # ==========================================================================
  CDCArchiveBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${AWS::StackName}-archive-${AWS::AccountId}
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToIA
            Status: Enabled
            Transitions:
              - StorageClass: STANDARD_IA
                TransitionInDays: 30
          - Id: Expire
            Status: Enabled
            ExpirationInDays: 90

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${AWS::StackName}-dashboard-${AWS::AccountId}
      WebsiteConfiguration:
        IndexDocument: index.html

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Sid: CloudFrontAccess
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${FrontendBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}

  # ==========================================================================
  # CLOUDFRONT
  # ==========================================================================
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub ${AWS::StackName}-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ''
          - Id: APIOrigin
            DomainName: !Sub ${MetricsAPI}.execute-api.${AWS::Region}.amazonaws.com
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: APIOrigin
            ViewerProtocolPolicy: https-only
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
            AllowedMethods: [GET, HEAD, OPTIONS, PUT, PATCH, POST, DELETE]
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac  # AllViewerExceptHostHeader
        PriceClass: PriceClass_100

  # ==========================================================================
  # API GATEWAY + LAMBDA (Metrics Proxy)
  # ==========================================================================
  MetricsLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole
      # Lambda only needs VPC access to reach EC2:8080 — no AWS API calls needed
      # VPC access is provided by AWSLambdaVPCAccessExecutionRole managed policy

  MetricsLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-metrics-api
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt MetricsLambdaRole.Arn
      Timeout: 30
      MemorySize: 256
      VpcConfig:
        SubnetIds: !Ref SubnetIds
        SecurityGroupIds: [!Ref SecurityGroupId]
      Environment:
        Variables:
          CW_NAMESPACE: CDC/PgToDSQL
          CDC_PRIVATE_IP: !GetAtt CDCInstance.PrivateIp
          CDC_HEALTH_PORT: '8080'
          CDC_INSTANCE_ID: !Ref CDCInstance
      Code:
        ZipFile: |
          import json
          import os
          import urllib.request
          import urllib.error

          def handler(event, context):
              """Simple proxy: forward ALL API requests to EC2 health server."""
              private_ip = os.environ.get('CDC_PRIVATE_IP', '')
              port = os.environ.get('CDC_HEALTH_PORT', '8080')
              
              # Extract request info
              path = event.get('rawPath', '/').replace('/api', '', 1) or '/'
              method = event.get('requestContext', {}).get('http', {}).get('method', 'GET')
              body = event.get('body', '')
              qp = event.get('queryStringParameters') or {}
              
              # Build query string
              qs = '&'.join(f'{k}={v}' for k, v in qp.items()) if qp else ''
              url = f'http://{private_ip}:{port}{path}'
              if qs:
                  url += f'?{qs}'
              
              try:
                  if method in ('POST', 'PUT', 'PATCH'):
                      data = body.encode() if body else None
                      req = urllib.request.Request(url, data=data, method=method)
                      req.add_header('Content-Type', 'application/json')
                  else:
                      req = urllib.request.Request(url, method=method)
                  
                  resp = urllib.request.urlopen(req, timeout=25)
                  resp_body = resp.read().decode()
                  return {
                      'statusCode': 200,
                      'headers': {'Content-Type': 'application/json', 'Access-Control-Allow-Origin': '*'},
                      'body': resp_body,
                  }
              except urllib.error.HTTPError as he:
                  resp_body = he.read().decode()
                  return {
                      'statusCode': he.code,
                      'headers': {'Content-Type': 'application/json', 'Access-Control-Allow-Origin': '*'},
                      'body': resp_body,
                  }
              except Exception as e:
                  return {
                      'statusCode': 502,
                      'headers': {'Content-Type': 'application/json', 'Access-Control-Allow-Origin': '*'},
                      'body': json.dumps({'error': f'EC2 unreachable: {str(e)}', 'instance': os.environ.get('CDC_INSTANCE_ID', '')}),
                  }

  MetricsAPI:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub ${AWS::StackName}-api
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - '*'
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        AllowHeaders:
          - Content-Type

  MetricsAPIIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref MetricsAPI
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt MetricsLambda.Arn
      PayloadFormatVersion: '2.0'

  MetricsAPIRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref MetricsAPI
      RouteKey: GET /api/{proxy+}
      Target: !Sub integrations/${MetricsAPIIntegration}

  MetricsAPIRoutePost:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref MetricsAPI
      RouteKey: POST /api/{proxy+}
      Target: !Sub integrations/${MetricsAPIIntegration}

  MetricsAPIStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref MetricsAPI
      StageName: $default
      AutoDeploy: true

  MetricsLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref MetricsLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${MetricsAPI}/*

  # ==========================================================================
  # CODEPIPELINE CI/CD
  # ==========================================================================

  # Custom Resource to empty S3 buckets on stack deletion
  EmptyBucketsOnDelete:
    Type: Custom::EmptyBuckets
    Properties:
      ServiceToken: !GetAtt EmptyBucketsFunction.Arn
      Buckets:
        - !Ref CDCArchiveBucket
        - !Ref FrontendBucket

  EmptyBucketsFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-empty-buckets
      Runtime: python3.12
      Handler: index.handler
      Timeout: 120
      Role: !GetAtt EmptyBucketsRole.Arn
      Code:
        ZipFile: |
          import boto3
          import cfnresponse
          def handler(event, context):
              if event['RequestType'] == 'Delete':
                  s3 = boto3.resource('s3')
                  for bucket_name in event['ResourceProperties'].get('Buckets', []):
                      try:
                          bucket = s3.Bucket(bucket_name)
                          bucket.object_versions.delete()
                          bucket.objects.delete()
                          print(f'Emptied bucket: {bucket_name}')
                      except Exception as e:
                          print(f'Error emptying {bucket_name}: {e}')
              cfnresponse.send(event, context, cfnresponse.SUCCESS, {})

  EmptyBucketsRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: EmptyBuckets
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:DeleteObject
                  - s3:DeleteObjectVersion
                  - s3:ListBucket
                  - s3:ListBucketVersions
                  - s3:GetObject
                Resource:
                  - !Sub ${CDCArchiveBucket.Arn}
                  - !Sub ${CDCArchiveBucket.Arn}/*
                  - !Sub ${FrontendBucket.Arn}
                  - !Sub ${FrontendBucket.Arn}/*


  # CLOUDWATCH DASHBOARD
  # ==========================================================================
  CDCDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub ${AWS::StackName}-CDC-Monitor
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric", "x": 0, "y": 0, "width": 12, "height": 6,
              "properties": {
                "title": "Replication Lag (Bytes)",
                "metrics": [["CDC/PgToDSQL", "ReplicationLagBytes"]],
                "period": 60, "stat": "Average", "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric", "x": 12, "y": 0, "width": 12, "height": 6,
              "properties": {
                "title": "Events Applied / Minute",
                "metrics": [["CDC/PgToDSQL", "EventsAppliedPerMinute"]],
                "period": 60, "stat": "Sum", "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric", "x": 0, "y": 6, "width": 12, "height": 6,
              "properties": {
                "title": "Events Failed",
                "metrics": [["CDC/PgToDSQL", "EventsFailed"]],
                "period": 60, "stat": "Sum", "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric", "x": 12, "y": 6, "width": 12, "height": 6,
              "properties": {
                "title": "Batch Queue Depth",
                "metrics": [["CDC/PgToDSQL", "BatchQueueDepth"]],
                "period": 60, "stat": "Average", "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric", "x": 0, "y": 12, "width": 24, "height": 6,
              "properties": {
                "title": "EC2 Instance CPU",
                "metrics": [
                  ["AWS/EC2", "CPUUtilization", "InstanceId", "${CDCInstance}"]
                ],
                "period": 60, "stat": "Average", "region": "${AWS::Region}"
              }
            }
          ]
        }

  # ==========================================================================
  # ALARMS
  # ==========================================================================
  LagAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-HighReplicationLag
      MetricName: ReplicationLagBytes
      Namespace: CDC/PgToDSQL
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      Threshold: 104857600  # 100MB
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: breaching

  FailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-EventFailures
      MetricName: EventsFailed
      Namespace: CDC/PgToDSQL
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

Outputs:
  DashboardURL:
    Value: !Sub https://${CloudFrontDistribution.DomainName}
    Description: CDC Monitoring Dashboard URL

  CloudWatchDashboard:
    Value: !Sub https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${CDCDashboard}
    Description: CloudWatch Metrics Dashboard

  CloudWatchLogsURL:
    Value: !Sub https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#logsV2:log-groups/log-group/$252Fec2$252F${AWS::StackName}-cdc
    Description: CloudWatch Logs for CDC service

  CDCInstanceId:
    Value: !Ref CDCInstance
    Description: EC2 Instance ID running the CDC service

  CDCInstanceConsole:
    Value: !Sub https://${AWS::Region}.console.aws.amazon.com/ec2/home?region=${AWS::Region}#Instances:search=${CDCInstance}
    Description: EC2 Instance Console Link

  APIURL:
    Value: !Sub https://${MetricsAPI}.execute-api.${AWS::Region}.amazonaws.com/api/metrics
    Description: Metrics API endpoint

  CDCHealthEndpoint:
    Value: !Sub http://${CDCInstance.PrivateIp}:8080/health
    Description: CDC service health check endpoint (private IP)
