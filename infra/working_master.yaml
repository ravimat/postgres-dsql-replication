AWSTemplateFormatVersion: '2010-09-09'
Description: |
  PostgreSQL to Aurora DSQL CDC Replication - One-Click Deployment
  Deploys the full CDC solution from a GitHub repository:
  - EC2 CDC service with systemd (24/7 streaming replication)
  - CloudFront + S3 monitoring dashboard
  - API Gateway + Lambda metrics proxy
  - CloudWatch Dashboard with replication metrics
  - CodePipeline CI/CD (auto-deploys on git push)

Parameters:
  # --- Source Code ---
  GitHubConnectionArn:
    Type: String
    Description: ARN of the CodeStar Connection to GitHub (create in console first)
  
  GitHubRepoOwner:
    Type: String
    Description: GitHub repository owner (user or org)
  
  GitHubRepoName:
    Type: String
    Description: GitHub repository name
  
  GitHubBranch:
    Type: String
    Default: main
    Description: Branch to deploy from

  # --- Database Config ---
  SourceDSN:
    Type: String
    NoEcho: true
    Description: PostgreSQL source connection string (e.g., host=xxx port=5432 dbname=xxx user=xxx password=xxx sslmode=require)
  
  TargetDSQLEndpoint:
    Type: String
    Description: Aurora DSQL cluster endpoint (e.g., xxx.dsql.us-east-1.on.aws)
  
  DSQLRegion:
    Type: String
    Default: us-east-1
    Description: AWS region of the DSQL cluster
  
  ConflictMode:
    Type: String
    Default: upsert
    AllowedValues: [upsert, skip, fail, last_write_wins]
    Description: How to handle conflicts on the target

  SlotName:
    Type: String
    Default: dsql_cdc_slot
    Description: PostgreSQL logical replication slot name

  DecodingPlugin:
    Type: String
    Default: test_decoding
    AllowedValues: [test_decoding, pgoutput]
    Description: Logical decoding plugin

  BatchSize:
    Type: Number
    Default: 1000
    Description: Events per batch

  ParallelWorkers:
    Type: Number
    Default: 4
    Description: Parallel DSQL writer threads

  # --- Networking ---

  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: Amazon Linux 2023 AMI (auto-resolved via SSM)

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC with connectivity to source PG and DSQL

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnets for EC2 instance and VPC endpoints

  SecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
    Description: Security group allowing outbound to PG (5432) and DSQL


Resources:


  # ==========================================================================
  # SECRETS
  # ==========================================================================
  SourceDSNSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub ${AWS::StackName}/source-dsn
      SecretString: !Ref SourceDSN

  # ==========================================================================

  # ==========================================================================
  # EC2 INSTANCE (CDC Service)
  # ==========================================================================
  CDCInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: CDCInstancePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                  - dsql:DbConnectAdmin
                Resource: '*'
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource:
                  - !Ref SourceDSNSecret
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub ${CDCArchiveBucket.Arn}/*
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchGetImage
                  - ecr:GetDownloadUrlForLayer
                Resource: '*'

  CDCInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref CDCInstanceRole]

  CDCInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.medium
      ImageId: !Ref LatestAmiId
      IamInstanceProfile: !Ref CDCInstanceProfile
      NetworkInterfaces:
        - DeviceIndex: '0'
          SubnetId: !Select [0, !Ref SubnetIds]
          GroupSet: [!Ref SecurityGroupId]
          AssociatePublicIpAddress: true
      MetadataOptions:
        HttpTokens: required
        HttpEndpoint: enabled
      Tags:
        - Key: Name
          Value: !Sub ${AWS::StackName}-cdc-worker
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -ex

          # Install dependencies
          yum update -y
          yum install -y python3.11 python3.11-pip git

          # Create app directory
          mkdir -p /opt/cdc
          cd /opt/cdc

          # Clone the repository
          git clone https://github.com/${GitHubRepoOwner}/${GitHubRepoName}.git .
          git checkout ${GitHubBranch}

          # Install Python dependencies
          python3.11 -m pip install psycopg2-binary boto3

          # Get SOURCE_DSN from Secrets Manager
          SOURCE_DSN=$(aws secretsmanager get-secret-value             --secret-id ${SourceDSNSecret}             --query SecretString --output text --region ${AWS::Region})

          # Create environment file
          cat > /opt/cdc/.env << ENVEOF
          SOURCE_DSN=${!SOURCE_DSN}
          TARGET_DSN=host=${TargetDSQLEndpoint} port=5432 dbname=postgres user=admin sslmode=require
          DSQL_HOSTNAME=${TargetDSQLEndpoint}
          DSQL_REGION=${DSQLRegion}
          SLOT_NAME=${SlotName}
          DECODING_PLUGIN=${DecodingPlugin}
          CONFLICT_MODE=${ConflictMode}
          BATCH_SIZE=${BatchSize}
          PARALLEL_WORKERS=${ParallelWorkers}
          FLUSH_INTERVAL_MS=500
          HEALTH_PORT=8080
          METRICS_ENABLED=true
          LOG_LEVEL=INFO
          S3_BUCKET=${CDCArchiveBucket}
          ENVEOF

          # Create systemd service
          cat > /etc/systemd/system/cdc-service.service << SVCEOF
          [Unit]
          Description=PG to Aurora DSQL CDC Replication Service
          After=network.target

          [Service]
          Type=simple
          User=root
          WorkingDirectory=/opt/cdc
          EnvironmentFile=/opt/cdc/.env
          ExecStart=/usr/bin/python3.11 /opt/cdc/cdc_service.py
          Restart=always
          RestartSec=5
          StandardOutput=journal
          StandardError=journal

          [Install]
          WantedBy=multi-user.target
          SVCEOF

          # Start the service
          systemctl daemon-reload
          systemctl enable cdc-service
          systemctl start cdc-service

          # Signal CloudFormation
          /opt/aws/bin/cfn-signal -e $? --stack ${AWS::StackName} --resource CDCInstance --region ${AWS::Region}
    CreationPolicy:
      ResourceSignal:
        Timeout: PT10M

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /ec2/${AWS::StackName}-cdc
      RetentionInDays: 30

    # ==========================================================================
  # S3 BUCKETS
  # ==========================================================================
  CDCArchiveBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${AWS::StackName}-archive-${AWS::AccountId}
      LifecycleConfiguration:
        Rules:
          - Id: TransitionToIA
            Status: Enabled
            Transitions:
              - StorageClass: STANDARD_IA
                TransitionInDays: 30
          - Id: Expire
            Status: Enabled
            ExpirationInDays: 90

  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${AWS::StackName}-dashboard-${AWS::AccountId}
      WebsiteConfiguration:
        IndexDocument: index.html

  FrontendBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Statement:
          - Sid: CloudFrontAccess
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${FrontendBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}

  # ==========================================================================
  # CLOUDFRONT
  # ==========================================================================
  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub ${AWS::StackName}-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref CloudFrontOAC
            S3OriginConfig:
              OriginAccessIdentity: ''
          - Id: APIOrigin
            DomainName: !Sub ${MetricsAPI}.execute-api.${AWS::Region}.amazonaws.com
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: APIOrigin
            ViewerProtocolPolicy: https-only
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled
            AllowedMethods: [GET, HEAD, OPTIONS]
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac  # AllViewerExceptHostHeader
        PriceClass: PriceClass_100

  # ==========================================================================
  # API GATEWAY + LAMBDA (Metrics Proxy)
  # ==========================================================================
  MetricsLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: CloudWatchRead
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudwatch:GetMetricData
                  - cloudwatch:ListMetrics
                  - ec2:DescribeInstanceStatus
                  - ec2:DescribeInstances
                Resource: '*'

  MetricsLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${AWS::StackName}-metrics-api
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt MetricsLambdaRole.Arn
      Timeout: 30
      MemorySize: 256
      Environment:
        Variables:
          CW_NAMESPACE: CDC/PgToDSQL
          CDC_INSTANCE_ID: !Ref CDCInstance
          CDC_HEALTH_PORT: '8080'
      Code:
        ZipFile: |
          import json
          import os
          import boto3
          from datetime import datetime, timedelta, timezone

          cw = boto3.client('cloudwatch')
          ec2_client = boto3.client('ec2')
          NAMESPACE = os.environ.get('CW_NAMESPACE', 'CDC/PgToDSQL')

          def handler(event, context):
              path = event.get('rawPath', event.get('path', '/'))
              
              if '/health' in path:
                  return get_health()
              elif '/metrics' in path:
                  return get_metrics()
              else:
                  return response(200, {'status': 'ok', 'endpoints': ['/api/health', '/api/metrics']})

          def get_metrics():
              end = datetime.now(timezone.utc)
              start = end - timedelta(hours=1)
              
              result = cw.get_metric_data(
                  MetricDataQueries=[
                      metric_query('lag', 'ReplicationLagBytes', 'Average'),
                      metric_query('events', 'EventsAppliedPerMinute', 'Sum'),
                      metric_query('failed', 'EventsFailed', 'Sum'),
                      metric_query('queue', 'BatchQueueDepth', 'Average'),
                  ],
                  StartTime=start,
                  EndTime=end,
              )
              
              metrics = {}
              for r in result['MetricDataResults']:
                  metrics[r['Id']] = {
                      'timestamps': [t.isoformat() for t in r['Timestamps']],
                      'values': r['Values'],
                  }
              
              return response(200, metrics)

          def get_health():
              try:
                  ec2 = boto3.client('ec2')
                  instance_id = os.environ['CDC_INSTANCE_ID']
                  resp = ec2.describe_instance_status(InstanceIds=[instance_id])
                  statuses = resp.get('InstanceStatuses', [])
                  if statuses:
                      s = statuses[0]
                      return response(200, {
                          'instance_state': s['InstanceState']['Name'],
                          'system_status': s['SystemStatus']['Status'],
                          'instance_status': s['InstanceStatus']['Status'],
                          'instance_id': instance_id,
                      })
                  return response(200, {'instance_state': 'unknown', 'instance_id': instance_id})
              except Exception as e:
                  return response(500, {'error': str(e)})

          def metric_query(id, name, stat):
              return {
                  'Id': id,
                  'MetricStat': {
                      'Metric': {'Namespace': NAMESPACE, 'MetricName': name},
                      'Period': 60,
                      'Stat': stat,
                  },
              }

          def response(code, body):
              return {
                  'statusCode': code,
                  'headers': {
                      'Content-Type': 'application/json',
                      'Access-Control-Allow-Origin': '*',
                  },
                  'body': json.dumps(body, default=str),
              }

  MetricsAPI:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub ${AWS::StackName}-api
      ProtocolType: HTTP

  MetricsAPIIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref MetricsAPI
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt MetricsLambda.Arn
      PayloadFormatVersion: '2.0'

  MetricsAPIRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref MetricsAPI
      RouteKey: GET /api/{proxy+}
      Target: !Sub integrations/${MetricsAPIIntegration}

  MetricsAPIStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref MetricsAPI
      StageName: $default
      AutoDeploy: true

  MetricsLambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref MetricsLambda
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${MetricsAPI}/*

  # ==========================================================================
  # CODEPIPELINE CI/CD
  # ==========================================================================
  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub ${AWS::StackName}-artifacts-${AWS::AccountId}

  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: CodeBuildPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'
              - Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:PutImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                  - ecr:BatchGetImage
                Resource: '*'
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:GetBucketLocation
                Resource:
                  - !Sub ${ArtifactBucket.Arn}/*
                  - !Sub ${FrontendBucket.Arn}/*
              - Effect: Allow
                Action:
                  - ecs:UpdateService
                Resource: '*'

  CodeBuildBackend:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub ${AWS::StackName}-deploy-backend
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        EnvironmentVariables:
          - Name: INSTANCE_ID
            Value: !Ref CDCInstance
          - Name: AWS_REGION_VAL
            Value: !Ref AWS::Region
      Source:
        Type: CODEPIPELINE
        BuildSpec: |
          version: 0.2
          phases:
            build:
              commands:
                - echo "Deploying CDC service update to EC2..."
                - |
                  aws ssm send-command \
                    --instance-ids $INSTANCE_ID \
                    --document-name "AWS-RunShellScript" \
                    --parameters 'commands=["cd /opt/cdc && git pull && systemctl restart cdc-service"]' \
                    --region $AWS_REGION_VAL


  CodeBuildFrontend:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub ${AWS::StackName}-build-frontend
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/amazonlinux2-x86_64-standard:5.0
        EnvironmentVariables:
          - Name: FRONTEND_BUCKET
            Value: !Ref FrontendBucket
          - Name: DISTRIBUTION_ID
            Value: !Ref CloudFrontDistribution
      Source:
        Type: CODEPIPELINE
        BuildSpec: |
          version: 0.2
          phases:
            build:
              commands:
                - echo Deploying frontend to S3...
                - aws s3 sync frontend/ s3://$FRONTEND_BUCKET/ --delete
            post_build:
              commands:
                - echo Invalidating CloudFront cache...
                - aws cloudfront create-invalidation --distribution-id $DISTRIBUTION_ID --paths "/*"

  PipelineRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: PipelinePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:*
                Resource:
                  - !Sub ${ArtifactBucket.Arn}
                  - !Sub ${ArtifactBucket.Arn}/*
              - Effect: Allow
                Action:
                  - codebuild:BatchGetBuilds
                  - codebuild:StartBuild
                Resource:
                  - !GetAtt CodeBuildBackend.Arn
                  - !GetAtt CodeBuildFrontend.Arn
              - Effect: Allow
                Action:
                  - codestar-connections:UseConnection
                Resource: !Ref GitHubConnectionArn

  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub ${AWS::StackName}-pipeline
      RoleArn: !GetAtt PipelineRole.Arn
      ArtifactStore:
        Type: S3
        Location: !Ref ArtifactBucket
      Stages:
        - Name: Source
          Actions:
            - Name: GitHub
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeStarSourceConnection
                Version: '1'
              Configuration:
                ConnectionArn: !Ref GitHubConnectionArn
                FullRepositoryId: !Sub ${GitHubRepoOwner}/${GitHubRepoName}
                BranchName: !Ref GitHubBranch
              OutputArtifacts:
                - Name: SourceCode

        - Name: Build
          Actions:
            - Name: BuildBackend
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref CodeBuildBackend
              InputArtifacts:
                - Name: SourceCode
              RunOrder: 1

            - Name: BuildFrontend
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: '1'
              Configuration:
                ProjectName: !Ref CodeBuildFrontend
              InputArtifacts:
                - Name: SourceCode
              RunOrder: 1

  # ==========================================================================
  # CLOUDWATCH DASHBOARD
  # ==========================================================================
  CDCDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub ${AWS::StackName}-CDC-Monitor
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric", "x": 0, "y": 0, "width": 12, "height": 6,
              "properties": {
                "title": "Replication Lag (Bytes)",
                "metrics": [["CDC/PgToDSQL", "ReplicationLagBytes"]],
                "period": 60, "stat": "Average", "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric", "x": 12, "y": 0, "width": 12, "height": 6,
              "properties": {
                "title": "Events Applied / Minute",
                "metrics": [["CDC/PgToDSQL", "EventsAppliedPerMinute"]],
                "period": 60, "stat": "Sum", "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric", "x": 0, "y": 6, "width": 12, "height": 6,
              "properties": {
                "title": "Events Failed",
                "metrics": [["CDC/PgToDSQL", "EventsFailed"]],
                "period": 60, "stat": "Sum", "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric", "x": 12, "y": 6, "width": 12, "height": 6,
              "properties": {
                "title": "Batch Queue Depth",
                "metrics": [["CDC/PgToDSQL", "BatchQueueDepth"]],
                "period": 60, "stat": "Average", "region": "${AWS::Region}"
              }
            },
            {
              "type": "metric", "x": 0, "y": 12, "width": 24, "height": 6,
              "properties": {
                "title": "EC2 Instance CPU",
                "metrics": [
                  ["AWS/EC2", "CPUUtilization", "InstanceId", "${CDCInstance}"]
                ],
                "period": 60, "stat": "Average", "region": "${AWS::Region}"
              }
            }
          ]
        }

  # ==========================================================================
  # ALARMS
  # ==========================================================================
  LagAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-HighReplicationLag
      MetricName: ReplicationLagBytes
      Namespace: CDC/PgToDSQL
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      Threshold: 104857600  # 100MB
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: breaching

  FailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub ${AWS::StackName}-EventFailures
      MetricName: EventsFailed
      Namespace: CDC/PgToDSQL
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

Outputs:
  DashboardURL:
    Value: !Sub https://${CloudFrontDistribution.DomainName}
    Description: CDC Monitoring Dashboard URL

  CloudWatchDashboard:
    Value: !Sub https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${CDCDashboard}
    Description: CloudWatch Dashboard URL

  APIURL:
    Value: !Sub https://${MetricsAPI}.execute-api.${AWS::Region}.amazonaws.com/api/metrics
    Description: Metrics API endpoint

  PipelineName:
    Value: !Ref Pipeline
    Description: CodePipeline name (auto-deploys on git push)

  CDCInstanceId:
    Value: !Ref CDCInstance
    Description: EC2 Instance ID running the CDC service

  CDCHealthEndpoint:
    Value: !Sub http://${CDCInstance.PrivateIp}:8080/health
    Description: CDC service health check endpoint (VPC-internal)

